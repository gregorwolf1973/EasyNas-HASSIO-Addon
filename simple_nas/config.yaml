name: "Simple NAS"
description: "Einfaches NAS mit Samba-Freigaben und Web-GUI zur Laufwerkverwaltung"
version: "2.0.9"
slug: "simple_nas"
init: false
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
ingress: true
ingress_port: 8099
host_network: true
privileged:
  - SYS_ADMIN
  - SYS_RAWIO
  - DAC_READ_SEARCH
full_access: true
apparmor: false
options:
  workgroup: "WORKGROUP"
  log_level: "info"
schema:
  workgroup: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)
map:
  - share:rw
  - media:rw
  - ssl:ro
