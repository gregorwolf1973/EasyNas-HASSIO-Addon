name: "Simple NAS"
description: "Einfaches NAS mit Samba-Freigaben und Web-GUI zur Laufwerkverwaltung"
version: "3.1.0"
url: "https://github.com/gregorwolf1973/EasyNas-HASSIO-Addon"
slug: "simple_nas"
init: false
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
ingress: true
ingress_port: 8099
panel_icon: "mdi:nas"
panel_title: "Simple NAS"
host_network: true
host_pid: true
privileged:
  - SYS_ADMIN
  - SYS_RAWIO
  - DAC_READ_SEARCH
full_access: true
apparmor: false
options:
  workgroup: "WORKGROUP"
  log_level: "info"
  web_port: 8099
  host_mount: false
schema:
  workgroup: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  web_port: port
  host_mount: bool
map:
  - share:rw
  - media:rw
  - ssl:ro
