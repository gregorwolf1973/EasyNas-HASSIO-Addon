name: "Simple NAS"
description: "Einfaches NAS mit Samba-Freigaben und Web-GUI zur Laufwerkverwaltung"
version: "3.0.25"
url: "https://github.com/gregorwolf1973/EasyNas-HASSIO-Addon"
slug: "simple_nas"
init: false
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
ingress: true
ingress_port: 8100
panel_icon: "mdi:nas"
panel_title: "Simple NAS"
host_network: true
privileged:
  - SYS_ADMIN
  - SYS_RAWIO
  - DAC_READ_SEARCH
full_access: true
apparmor: false
options:
  workgroup: "WORKGROUP"
  nas_name: "SimpleNAS"
  log_level: "info"
  web_port: 8100
  admin_password_enabled: false
  admin_username: "admin"
  admin_password: ""
schema:
  workgroup: str
  nas_name: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  web_port: port
  admin_password_enabled: bool
  admin_username: str
  admin_password: str
map:
  - share:rw
  - media:rw
  - ssl:ro
  - config:rw
  - addon_configs:rw
