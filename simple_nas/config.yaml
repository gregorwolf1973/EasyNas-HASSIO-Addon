name: "Simple NAS"
description: "Einfaches NAS mit Samba-Freigaben und Web-GUI zur Laufwerkverwaltung"
version: "1.0.3"
slug: "simple_nas"
init: false
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
ingress: true
ingress_port: 8099
host_network: true
# full_access = Docker --privileged → nötig damit Block-Devices mountbar sind
# Ohne full_access blockt die cgroup device whitelist den Kernel-open() auf /dev/sdXX
full_access: true
options:
  workgroup: "WORKGROUP"
  log_level: "info"
schema:
  workgroup: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)
map:
  - share:rw
  - media:rw
  - ssl:ro
