configuration:
  workgroup:
    name: Arbeitsgruppe
    description: Windows-Arbeitsgruppenname (Standard WORKGROUP)
  log_level:
    name: Log-Level
    description: Samba Log-Ausführlichkeit
  web_port:
    name: Web-GUI Port
    description: Port für die Web-Oberfläche (Standard 8099)
  host_mount:
    name: Host-Mount Modus
    description: >-
      Wenn aktiviert, werden Laufwerke auf Host-Ebene gemountet und sind für ALLE
      Addons und HA-Automationen unter /media/ sichtbar. Wenn deaktiviert (Standard),
      sind Mounts nur innerhalb dieses Addons sichtbar. Erfordert Addon-Neustart nach Änderung.
