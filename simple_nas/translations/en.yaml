configuration:
  workgroup:
    name: Workgroup
    description: Windows workgroup name (default WORKGROUP)
  log_level:
    name: Log Level
    description: Samba log verbosity
  web_port:
    name: Web GUI Port
    description: Port for the web interface (default 8099). Note - if you change this from 8099 the HA Ingress 'Open' button may not work. Access the GUI directly via http://YOUR-HA-IP:PORT instead.
