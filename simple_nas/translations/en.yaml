configuration:
  workgroup:
    name: Workgroup
    description: Windows workgroup name (default WORKGROUP)
  log_level:
    name: Log Level
    description: Samba log verbosity
  web_port:
    name: Web GUI Port
    description: Port for the web interface (default 8099)
  host_mount:
    name: Host-Mount Mode
    description: >-
      When enabled, drives are mounted at the host level and visible to ALL addons
      and HA automations under /media/. When disabled (default), mounts are only
      visible inside this addon. Requires addon restart after changing.
