<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple NAS – Login</title>
<style>
  :root {
    --primary: #03a9f4;
    --bg: #f5f6fa;
    --surface: #ffffff;
    --border: #e1e5eb;
    --text: #1c1c1c;
    --text-dim: #6e7681;
    --danger: #db4437;
    --shadow: 0 2px 8px rgba(0,0,0,.10);
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --primary: #4fc3f7;
      --bg: #111318;
      --surface: #1c1f27;
      --border: #333842;
      --text: #c8cdd5;
      --text-dim: #6b7280;
      --danger: #f44336;
      --shadow: 0 2px 8px rgba(0,0,0,.35);
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px 36px;
    width: 100%;
    max-width: 360px;
  }
  .logo {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 20px; font-weight: 700; color: var(--primary);
    margin-bottom: 28px;
  }
  .logo svg { width: 32px; height: 32px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 6px;
  }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--primary); }
  button[type=submit] {
    width: 100%;
    padding: 10px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .15s;
  }
  button[type=submit]:hover { opacity: .88; }
  .error {
    background: rgba(219,68,55,.1);
    border: 1px solid rgba(219,68,55,.3);
    color: var(--danger);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <ellipse cx="12" cy="5" rx="9" ry="3"/>
      <path d="M3 5v4c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
      <path d="M3 9v4c0 1.66 4.03 3 9 3s9-1.34 9-3V9"/>
      <path d="M3 13v4c0 1.66 4.03 3 9 3s9-1.34 9-3v-4"/>
    </svg>
    Simple NAS
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label for="username">Benutzer / Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    <label for="password">Passwort / Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
    <button type="submit">Anmelden / Login</button>
  </form>
</div>
</body>
</html>
