name: "Simple NAS v4"
description: "NAS mit Samba-Freigaben, Web-GUI, by-id Mounts und optionaler GUI-Deaktivierung"
version: "4.0.0"
url: "https://github.com/gregorwolf1973/EasyNas-HASSIO-Addon"
slug: "simple_nas_v4"
init: false
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
ingress: true
ingress_port: 8100
panel_icon: "mdi:nas"
panel_title: "Simple NAS v4"
host_network: true
privileged:
  - SYS_ADMIN
  - SYS_RAWIO
  - DAC_READ_SEARCH
full_access: true
apparmor: false
options:
  workgroup: "WORKGROUP"
  nas_name: "SimpleNAS"
  log_level: "info"
  web_port: 8100
  admin_password_enabled: false
  admin_username: "admin"
  admin_password: ""
  smb_port: 445
  web_gui_enabled: true
schema:
  workgroup: str
  nas_name: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  web_port: port
  admin_password_enabled: bool
  admin_username: str
  admin_password: str
  smb_port: port
  web_gui_enabled: bool
map:
  - share:rw
  - media:rw
  - ssl:rw
  - config:rw
  - all_addon_configs:rw
